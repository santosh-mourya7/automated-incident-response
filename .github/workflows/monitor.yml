name: Health Monitor & Incident Creator

on:
  schedule:
    - cron: '*/15 * * * *'   # Runs every 15 minutes
  workflow_dispatch:           # Allows manual trigger

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Health Check
        id: health
        run: python scripts/health_check.py
        env:
          MONITOR_URL: ${{ secrets.MONITOR_URL }}
        continue-on-error: true

      - name: Create Incident if Unhealthy
        if: steps.health.outcome == 'failure'
        run: python scripts/create_incident.py
        env:
          SNOW_INSTANCE:     ${{ secrets.SNOW_INSTANCE }}
          SNOW_USERNAME:     ${{ secrets.SNOW_USERNAME }}
          SNOW_PASSWORD:     ${{ secrets.SNOW_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}